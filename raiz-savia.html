<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raíz Savia — Inventario de Especies Vegetales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Paleta Raíz Savia — extraída del logo */
  --ink:       #1a2e1a;   /* verde muy oscuro casi negro */
  --paper:     #f7f5f0;   /* crema cálido */
  --deep:      #1b3d1a;   /* verde oscuro logo */
  --forest:    #2d6b2a;   /* verde medio */
  --leaf:      #4a9444;   /* verde brillante */
  --sap:       #6ab84a;   /* verde lima savia */
  --drop:      #3a9e6e;   /* verde-azulado gota */
  --mist:      #d6ecce;   /* verde muy pálido */
  --smoke:     #eaebe3;   /* fondo sidebar */
  --border:    #b8c9b0;   /* borde verde pálido */
  --card:      #f0f4ec;   /* tarjeta */
  --rust:      #9c3526;   /* rojo error */
  --clay:      #7a6040;   /* marrón tierra raíces */
  --gold:      #c8a040;   /* dorado raíces */
  --mono: 'DM Mono', monospace;
  --sans: 'Nunito', sans-serif;
  --display: 'Playfair Display', serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--smoke)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Layout ── */
#app{display:grid;grid-template-rows:60px 40px 1fr;height:100vh;overflow:hidden}
#main{display:grid;grid-template-columns:310px 1fr;overflow:hidden}

/* ── Header — estética Raíz Savia ── */
#header{
  background: linear-gradient(135deg, var(--deep) 0%, var(--forest) 60%, var(--drop) 100%);
  display:flex;align-items:center;gap:14px;
  padding:0 22px;
  border-bottom:3px solid var(--sap);
  position:relative;z-index:10;
  box-shadow: 0 2px 12px rgba(27,61,26,.35);
}
/* Logo SVG inline — árbol estilizado */
.logo-mark{
  width:36px;height:36px;flex-shrink:0;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
}
.brand-block{display:flex;flex-direction:column;gap:1px}
.brand-name{
  font-family: var(--sans);
  font-weight:800;
  font-size:1.2rem;
  letter-spacing:.02em;
  line-height:1;
  color: #fff;
}
.brand-name span.raiz{color:#fff}
.brand-name span.savia{color:var(--sap)}
/* gota en la i de SAVIA */
.brand-name span.drop-i{
  position:relative;display:inline-block;
}
.brand-name span.drop-i::after{
  content:'💧';font-size:.55rem;
  position:absolute;top:-4px;left:50%;transform:translateX(-50%);
}
.brand-sub{font-size:.58rem;color:var(--mist);text-transform:uppercase;letter-spacing:.14em;opacity:.8;font-family:var(--mono)}
#header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge{
  background:var(--sap);color:var(--deep);
  font-size:.65rem;font-weight:700;padding:3px 10px;border-radius:20px;
  font-family:var(--mono);
}

/* ── Nav ── */
#nav{
  background:var(--smoke);
  border-bottom:2px solid var(--border);
  display:flex;padding:0 22px;gap:0;overflow-x:auto;
}
.nav-tab{
  padding:9px 18px;font-family:var(--sans);font-size:.72rem;text-transform:uppercase;
  letter-spacing:.07em;font-weight:700;border:none;background:transparent;cursor:pointer;
  color:#7a9070;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;
}
.nav-tab:hover{color:var(--forest)}
.nav-tab.active{color:var(--deep);border-bottom-color:var(--sap)}

/* ── Sidebar ── */
#sidebar{border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--smoke)}
#sidebar-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
#sidebar-filters{padding:6px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap}
#species-list{flex:1;overflow-y:auto}

/* ── Buttons ── */
.btn{padding:6px 13px;border:none;cursor:pointer;font-family:var(--sans);font-size:.72rem;border-radius:6px;transition:all .15s;font-weight:700;line-height:1}
.btn-p{background:var(--forest);color:#fff;box-shadow:0 1px 4px rgba(27,61,26,.25)}
.btn-p:hover{background:var(--leaf)}
.btn-s{background:var(--card);color:var(--ink);border:1px solid var(--border)}
.btn-s:hover{background:var(--mist)}
.btn-d{background:var(--rust);color:#fff}
.btn-d:hover{background:#7a2319}
.btn-c{background:var(--clay);color:#fff}
.btn-c:hover{background:#5a4828}
.btn-sm{padding:3px 9px;font-size:.65rem}
.btn-icon{padding:5px 8px;background:transparent;border:1px solid var(--border);color:var(--ink);border-radius:5px;cursor:pointer;font-size:.85rem;transition:all .15s}
.btn-icon:hover{background:var(--mist)}

/* ── Search ── */
#search{
  flex:1;min-width:120px;padding:6px 10px;border:1.5px solid var(--border);
  background:#fff;font-family:var(--sans);font-size:.75rem;border-radius:6px;
  outline:none;color:var(--ink);transition:border-color .15s;font-weight:600;
}
#search:focus{border-color:var(--leaf);box-shadow:0 0 0 2px rgba(106,184,74,.2)}
.flt{
  padding:3px 10px;font-size:.62rem;border-radius:12px;
  border:1.5px solid var(--border);background:transparent;cursor:pointer;
  font-family:var(--sans);color:#7a9070;transition:all .15s;font-weight:700;
}
.flt:hover,.flt.on{background:var(--deep);color:var(--sap);border-color:var(--deep)}

/* ── Species item ── */
.sp-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;border-left:3px solid transparent;
}
.sp-item:hover{background:var(--mist)}
.sp-item.sel{background:var(--mist);border-left-color:var(--sap)}
.sp-cn{font-size:.83rem;font-weight:700;color:var(--deep)}
.sp-sn{font-size:.68rem;color:#7a9070;font-style:italic;margin-top:2px}
.sp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:.58rem;padding:2px 8px;border-radius:12px;font-family:var(--sans);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.tg{background:#d4edda;color:#155724}
.tr{background:#fff3cd;color:#856404}
.tm{background:#f8d7da;color:#721c24}
.ta{background:var(--mist);color:var(--deep)}
.ti{background:#fde8d0;color:#7a4010}
.th{background:var(--smoke);color:#555}
.trisk{background:#f8d7da;color:#721c24}

.empty{padding:40px 20px;text-align:center;color:#aaa;font-size:.75rem}
.empty-icon{font-size:2rem;margin-bottom:8px;opacity:.4}

/* ── Detail panel ── */
#detail{overflow-y:auto;padding:24px;background:var(--paper)}
#placeholder{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#bbb}
#placeholder .big{font-size:4rem;opacity:.2}

/* ── Detail header ── */
.dh-cn{font-family:var(--display);font-size:1.6rem;font-weight:900;color:var(--deep);line-height:1.1}
.dh-sn{font-size:.88rem;font-style:italic;color:#7a9070;margin-top:4px;font-family:var(--display)}
.dh-fam{font-size:.7rem;color:#aaa;margin-top:3px;font-family:var(--mono)}
.dh-uid{font-size:.6rem;color:#ccc;margin-top:5px;font-family:var(--mono)}
.dh-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.detail-sep{border:none;border-top:2px solid var(--border);margin:14px 0 18px}
.d-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}

/* ── Data cards grid ── */
.dc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.dc{
  background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:12px;
  border-top:3px solid var(--leaf);
}
.dc-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:3px;font-family:var(--mono)}
.dc-val{font-size:.92rem;font-weight:700;color:var(--deep);font-family:var(--sans)}
.dc-unit{font-size:.62rem;color:#aaa;margin-left:3px;font-weight:400}
/* tarjeta calculada */
.dc.calc{border-top-color:var(--drop);background:#f0f8f4}
.dc.calc .dc-label::before{content:'∑ ';color:var(--drop)}

/* ── Subsection ── */
.sub-title{
  font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--clay);
  font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px;
  font-family:var(--sans);
}
.sub-title::after{content:'';flex:1;height:1.5px;background:var(--border)}

.notes{
  background:#fffef5;border:1px solid #d4cc9e;border-radius:6px;
  padding:10px 12px;font-size:.78rem;line-height:1.7;white-space:pre-wrap;
  color:var(--ink);font-family:var(--sans);
}

/* ── Interv ── */
.iv-list{display:flex;flex-direction:column;gap:7px}
.iv{
  background:var(--card);border-left:4px solid var(--sap);
  padding:7px 11px;border-radius:0 6px 6px 0;font-size:.75rem;
}
.iv-date{font-size:.6rem;color:#aaa;margin-bottom:2px;font-family:var(--mono)}

/* ── GPS badge ── */
.gps-b{
  display:inline-flex;align-items:center;gap:6px;background:var(--mist);
  border:1.5px solid var(--leaf);border-radius:6px;padding:4px 10px;
  font-size:.68rem;color:var(--deep);margin-bottom:7px;font-weight:700;
}
.gps-dot{width:6px;height:6px;background:var(--leaf);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── Photos ── */
.photo-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.ph-thumb{width:90px;height:90px;object-fit:cover;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:transform .15s}
.ph-thumb:hover{transform:scale(1.05);border-color:var(--leaf)}

/* ── Modal ── */
#overlay{position:fixed;inset:0;background:rgba(15,25,15,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#modal{
  background:var(--paper);border:1.5px solid var(--border);border-radius:10px;
  width:100%;max-width:820px;max-height:92vh;display:flex;flex-direction:column;
  box-shadow:0 28px 90px rgba(0,0,0,.4);
}
#modal-head{
  padding:16px 24px;border-bottom:2px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:linear-gradient(135deg,var(--deep),var(--forest));
  border-radius:8px 8px 0 0;
}
#modal-head h2{font-family:var(--sans);font-size:1rem;color:#fff;font-weight:800;letter-spacing:.02em}
#modal-body{overflow-y:auto;padding:18px 24px;flex:1}
#modal-foot{
  padding:13px 24px;border-top:1.5px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;
  background:var(--smoke);border-radius:0 0 8px 8px;
}

/* ── Form ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f{display:flex;flex-direction:column;gap:4px}
.f.fw{grid-column:1/-1}
.flbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:#7a9070;font-weight:700;font-family:var(--sans)}
input[type=text],input[type=number],input[type=date],select,textarea{
  padding:7px 10px;border:1.5px solid var(--border);background:#fff;
  font-family:var(--sans);font-size:.78rem;border-radius:6px;outline:none;
  color:var(--ink);transition:border-color .15s;width:100%;font-weight:600;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--leaf);
  box-shadow:0 0 0 2px rgba(106,184,74,.18);
}
input[readonly]{
  background:var(--mist);color:var(--deep);
  border-color:var(--drop);cursor:not-allowed;font-weight:700;
}
textarea{resize:vertical;min-height:70px}
select{cursor:pointer}
.sec{
  grid-column:1/-1;
  font-family:var(--sans);font-size:.92rem;font-weight:800;
  color:var(--deep);padding:14px 0 7px;
  border-bottom:2px solid var(--border);
  margin-bottom:2px;display:flex;align-items:center;gap:9px;
}
.sec .n{
  background:linear-gradient(135deg,var(--deep),var(--drop));color:var(--sap);
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-family:var(--mono);flex-shrink:0;
}
.gps-row{display:flex;gap:7px;align-items:center}
.gps-row input{flex:1}

/* DAP auto-calc indicator */
.dap-info{
  font-size:.6rem;color:var(--drop);font-family:var(--mono);
  margin-top:3px;display:flex;align-items:center;gap:4px;
}
.dap-info::before{content:'∑';font-size:.7rem}

/* ── Interv input ── */
.iv-add-row{display:flex;gap:7px;margin-bottom:6px}
.iv-add-row input{flex:1}
#iv-form-list{display:flex;flex-direction:column;gap:5px}

/* ── Photo add ── */
.ph-add{
  width:80px;height:80px;border:2px dashed var(--border);border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;color:#bbb;font-size:.62rem;background:transparent;
  transition:all .15s;font-family:var(--sans);font-weight:700;
}
.ph-add:hover{border-color:var(--leaf);color:var(--forest);background:var(--mist)}
#photo-preview{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.ph-del{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;transition:opacity .15s}
.ph-del:hover{opacity:.55}

/* ── Stats ── */
#stats-view{height:100%;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.sc{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:18px;
  border-top:4px solid var(--leaf);
}
.sc-n{font-family:var(--display);font-size:2.1rem;color:var(--deep);font-weight:900;line-height:1}
.sc-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-top:6px;font-weight:700}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:0;padding-bottom:20px}
@media(max-width:600px){.charts{grid-template-columns:1fr}}
.chart-box{padding:16px}
.chart-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--clay);margin-bottom:12px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:.7rem;width:110px;flex-shrink:0;color:var(--ink);font-weight:600}
.bar-track{flex:1;background:var(--smoke);border-radius:3px;height:15px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--forest),var(--leaf));border-radius:3px;display:flex;align-items:center;padding-left:6px;min-width:22px;transition:width .65s ease}
.bar-v{font-size:.62rem;color:#fff;font-weight:700}

/* ── Toast ── */
#toasts{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  background:var(--deep);color:#fff;padding:9px 15px;border-radius:7px;
  font-size:.75rem;font-family:var(--sans);font-weight:700;
  box-shadow:0 4px 18px rgba(0,0,0,.25);animation:tin .2s ease;
  border-left:4px solid var(--sap);
}
.toast.err{background:var(--rust);border-left-color:#fbb}
@keyframes tin{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* ── Lightbox ── */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:none;align-items:center;justify-content:center;cursor:pointer}
#lb.open{display:flex}
#lb img{max-width:95%;max-height:95%;border-radius:8px}

/* ── Splash / watermark footer ── */
.rs-footer{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
  font-size:.55rem;color:rgba(100,130,90,.4);font-family:var(--mono);
  pointer-events:none;white-space:nowrap;z-index:1;
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <!-- Logo SVG árbol estilizado Raíz Savia -->
    <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="19" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
      <!-- raíces -->
      <path d="M20 28 Q16 33 12 35" stroke="#c8a040" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M20 28 Q20 34 20 37" stroke="#c8a040" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M20 28 Q24 33 28 35" stroke="#c8a040" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M20 28 Q18 31 15 33" stroke="#a07830" stroke-width="1" stroke-linecap="round"/>
      <path d="M20 28 Q22 31 25 33" stroke="#a07830" stroke-width="1" stroke-linecap="round"/>
      <!-- tronco -->
      <path d="M20 28 Q19 24 20 18" stroke="#7a5c2a" stroke-width="2" stroke-linecap="round"/>
      <!-- copa izquierda -->
      <ellipse cx="14" cy="14" rx="5.5" ry="6.5" fill="rgba(45,107,42,.85)"/>
      <ellipse cx="14" cy="14" rx="4" ry="5" fill="rgba(74,148,68,.7)"/>
      <!-- copa derecha -->
      <ellipse cx="26" cy="14" rx="5.5" ry="6.5" fill="rgba(45,107,42,.85)"/>
      <ellipse cx="26" cy="14" rx="4" ry="5" fill="rgba(74,148,68,.7)"/>
      <!-- copa centro arriba -->
      <ellipse cx="20" cy="10" rx="5" ry="6" fill="rgba(55,120,50,.9)"/>
      <ellipse cx="20" cy="10" rx="3.5" ry="4.5" fill="rgba(106,184,74,.75)"/>
      <!-- brillo hoja punta -->
      <circle cx="20" cy="5" r="1.5" fill="rgba(160,220,100,.9)"/>
      <!-- gota azul-verde -->
      <ellipse cx="28" cy="24" rx="2" ry="2.8" fill="rgba(58,158,110,.9)"/>
      <circle cx="28" cy="22" r="1.2" fill="rgba(80,200,140,.8)"/>
    </svg>

    <div class="brand-block">
      <div class="brand-name">
        <span class="raiz">RAÍZ</span> <span class="savia">SAV<span class="drop-i">I</span>A</span>
      </div>
      <div class="brand-sub">Inventario de Especies Vegetales</div>
    </div>

    <div id="header-right">
      <span class="badge" id="badge-count">0 ejemplares</span>
      <button class="btn btn-c btn-sm" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-c btn-sm" onclick="exportGeoJSON()">⬇ GeoJSON</button>
    </div>
  </header>

  <!-- Nav -->
  <nav id="nav">
    <button class="nav-tab active" data-tab="inventario" onclick="switchTab('inventario',this)">🌳 Inventario</button>
    <button class="nav-tab" data-tab="estadisticas" onclick="switchTab('estadisticas',this)">📊 Estadísticas</button>
  </nav>

  <!-- Main -->
  <div id="main">
    <aside id="sidebar">
      <div id="sidebar-head">
        <input id="search" placeholder="Buscar especie, municipio..." oninput="renderList()">
        <button class="btn btn-p btn-sm" onclick="openNew()">+ Nuevo</button>
      </div>
      <div id="sidebar-filters">
        <button class="flt on" data-f="" onclick="setFilter('',this)">Todos</button>
        <button class="flt" data-f="Bueno" onclick="setFilter('Bueno',this)">Bueno</button>
        <button class="flt" data-f="Regular" onclick="setFilter('Regular',this)">Regular</button>
        <button class="flt" data-f="Malo" onclick="setFilter('Malo',this)">Malo</button>
      </div>
      <div id="species-list"></div>
    </aside>

    <div id="detail">
      <div id="placeholder">
        <div class="big">🌿</div>
        <div style="font-family:var(--display);font-size:1.1rem;color:#bbb">Selecciona un ejemplar</div>
        <div style="font-size:.72rem;color:#ccc;margin-top:3px">o registra uno nuevo con + Nuevo</div>
        <button class="btn btn-p" style="margin-top:16px" onclick="openNew()">+ Registrar Primer Ejemplar</button>
      </div>
    </div>

    <div id="stats-view" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div id="modal-head">
      <h2 id="modal-title">Nuevo Ejemplar</h2>
      <button class="btn-icon" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-foot">
      <button class="btn btn-s" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveForm()">💾 Guardar</button>
    </div>
  </div>
</div>

<div id="toasts"></div>
<div id="lb" onclick="closeLB()"><img id="lb-img" src="" alt="foto"></div>
<div class="rs-footer">© Raíz Savia · Mángel Duque · Extremadura 2026</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'raiz-savia-v1';

// Carga segura desde localStorage
function loadDB() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}

let db = loadDB();
let selectedId = null;
let filterSalud = '';
let editingId = null;
let formPhotos = [];
let formIntervs = [];

// Guardado robusto con verificación
function save() {
  try {
    const json = JSON.stringify(db);
    localStorage.setItem(STORAGE_KEY, json);
    // Verificar que realmente se guardó
    const check = localStorage.getItem(STORAGE_KEY);
    if (!check) throw new Error('localStorage devolvió null tras guardar');
    return true;
  } catch(e) {
    console.error('Error al guardar:', e);
    toast('Error al guardar: ' + e.message, 'err');
    return false;
  }
}

// UUID sin depender de crypto (compatible con file://, WebView, HTTP sin TLS)
function uuid() {
  try {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  } catch(e) {}
  // Fallback manual RFC4122 v4
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Fórmula DAP ← Perímetro: DAP = P / π ─────────────────────────────────
// El perímetro (circunferencia) = π × DAP  →  DAP = P / π
function calcDAP(perimetro) {
  const p = parseFloat(perimetro);
  if (!p || p <= 0) return '';
  return (p / Math.PI).toFixed(2);
}

const HABITS = ['Árbol','Arbusto','Hierba','Trepadora','Palmera','Cactácea','Otra'];
const FENOLS = ['Reposo vegetativo','Brotación','En hoja','En floración','Con frutos','Senescencia','Indefinida'];
const SALUDS = ['Bueno','Regular','Malo'];
const ORIGENS= ['Autóctona','Introducida','Naturalizada','Cultivar','Desconocido'];
const RIESGOS= ['Bajo','Moderado','Alto','Crítico'];
const METODOS= ['Cinta métrica','Forcípula','Hipsómetro','Clinómetro','Estimación visual','Fotogrametría','GPS diferencial'];

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const inv = document.getElementById('main');
  const stats = document.getElementById('stats-view');
  const detail = document.getElementById('detail');
  const sidebar = document.getElementById('sidebar');
  if (tab==='inventario') {
    sidebar.style.display=''; detail.style.display='';
    stats.style.display='none'; inv.style.display='grid';
  } else {
    sidebar.style.display='none'; detail.style.display='none';
    stats.style.display='block'; stats.style.overflow='auto';
    inv.style.display='block'; renderStats();
  }
}

// ── Filters ───────────────────────────────────────────────────────────────
function setFilter(v, el) {
  filterSalud = v;
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); renderList();
}

function getFiltered() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  return db.filter(s=>{
    const match = !q
      || (s.nombreComun||'').toLowerCase().includes(q)
      || (s.nombreCientifico||'').toLowerCase().includes(q)
      || (s.municipio||'').toLowerCase().includes(q)
      || (s.familia||'').toLowerCase().includes(q);
    return match && (!filterSalud || s.salud===filterSalud);
  });
}

function tagSalud(s){return {Bueno:'tg',Regular:'tr',Malo:'tm'}[s]||'th'}
function tagOrigen(s){return s==='Autóctona'?'ta':'ti'}

// ── Render list ───────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('species-list');
  const data = getFiltered();
  document.getElementById('badge-count').textContent = db.length+' ejemplares';
  if (!data.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div>${db.length?'Sin resultados.':'Sin registros. Añade el primer ejemplar.'}</div>`;
    return;
  }
  list.innerHTML = data.map(s=>`
    <div class="sp-item${selectedId===s.id?' sel':''}" onclick="selectSp('${s.id}')">
      <div class="sp-cn">${esc(s.nombreComun)||'(sin nombre)'}</div>
      <div class="sp-sn">${esc(s.nombreCientifico)||'—'}</div>
      <div class="sp-tags">
        ${s.salud?`<span class="tag ${tagSalud(s.salud)}">${esc(s.salud)}</span>`:''}
        ${s.origen?`<span class="tag ${tagOrigen(s.origen)}">${esc(s.origen)}</span>`:''}
        ${s.habito?`<span class="tag th">${esc(s.habito)}</span>`:''}
        ${s.riesgo&&s.riesgo!=='Bajo'?`<span class="tag trisk">⚠ ${esc(s.riesgo)}</span>`:''}
      </div>
    </div>`).join('');
}

function selectSp(id) {
  selectedId = id; renderList();
  const sp = db.find(s=>s.id===id);
  if (sp) renderDetail(sp);
}

// ── Detail ────────────────────────────────────────────────────────────────
function dc(label, val, unit='', calc=false) {
  if (!val && val!==0) return '';
  return `<div class="dc${calc?' calc':''}"><div class="dc-label">${label}</div><div class="dc-val">${esc(val)}<span class="dc-unit">${unit}</span></div></div>`;
}

function renderDetail(sp) {
  const det = document.getElementById('detail');
  const ph = document.getElementById('placeholder');
  if (ph) ph.style.display='none';

  const ab = sp.dap ? (Math.PI*Math.pow(parseFloat(sp.dap)/200,2)).toFixed(4) : null;

  let html = `
  <div class="dh-cn">${esc(sp.nombreComun)||'Sin nombre'}</div>
  <div class="dh-sn">${esc(sp.nombreCientifico)||''}</div>
  ${sp.familia||sp.genero?`<div class="dh-fam">Familia: ${esc(sp.familia||'—')}${sp.genero?' · Género: '+esc(sp.genero):''}</div>`:''}
  <div class="dh-uid">ID: ${sp.id}${sp.fechaRegistro?' · '+new Date(sp.fechaRegistro).toLocaleString('es-ES'):''}</div>
  <div class="dh-tags">
    ${sp.salud?`<span class="tag ${tagSalud(sp.salud)}">${esc(sp.salud)}</span>`:''}
    ${sp.origen?`<span class="tag ${tagOrigen(sp.origen)}">${esc(sp.origen)}</span>`:''}
    ${sp.habito?`<span class="tag th">${esc(sp.habito)}</span>`:''}
    ${sp.riesgo&&sp.riesgo!=='Bajo'?`<span class="tag trisk">⚠ Riesgo ${esc(sp.riesgo)}</span>`:''}
    ${sp.fenologia?`<span class="tag th">${esc(sp.fenologia)}</span>`:''}
  </div>
  <hr class="detail-sep">
  <div class="d-actions">
    <button class="btn btn-s btn-sm" onclick="openEdit('${sp.id}')">✏️ Editar</button>
    <button class="btn btn-d btn-sm" onclick="deleteSp('${sp.id}')">🗑 Eliminar</button>
    ${sp.lat&&sp.lon?`<a class="btn btn-s btn-sm" href="https://www.google.com/maps?q=${sp.lat},${sp.lon}" target="_blank" rel="noopener">🗺 Ver en Mapa</a>`:''}
  </div>`;

  if (sp.lat||sp.ubicacionDesc) {
    html += `<div class="sub-title">Ubicación</div>`;
    if (sp.lat&&sp.lon) html += `<div class="gps-b"><span class="gps-dot"></span>${sp.lat}, ${sp.lon}</div>`;
    if (sp.ubicacionDesc) html += `<div style="font-size:.78rem;margin-top:4px">${esc(sp.ubicacionDesc)}${sp.municipio?' · '+esc(sp.municipio):''}</div>`;
  }

  html += `<div class="sub-title" style="margin-top:18px">Datos Dendrométricos</div>
  <div class="dc-grid">
    ${dc('Perímetro Tronco', sp.perimetro, ' cm')}
    ${dc('DAP — calc. (P/π)', sp.dap, ' cm', true)}
    ${dc('Altura Total', sp.altura, ' m')}
    ${dc('Anchura de Copa', sp.anchuraCopa, ' m')}
    ${ab?dc('Área Basal (π·r²)', ab, ' m²', true):''}
  </div>`;

  if (sp.deficiencias||sp.observaciones) {
    html += `<div class="sub-title">Estado de Salud</div>`;
    if (sp.deficiencias) html += `<div style="font-size:.65rem;color:#aaa;margin-bottom:4px">Deficiencias / Daños</div><div class="notes">${esc(sp.deficiencias)}</div>`;
    if (sp.observaciones) html += `<div style="font-size:.65rem;color:#aaa;margin:10px 0 4px">Observaciones</div><div class="notes">${esc(sp.observaciones)}</div>`;
  }

  html += `<div class="sub-title">Gestión y Mantenimiento</div>
  <div class="dc-grid">
    ${dc('Próxima Intervención', sp.proximaInterv)}
    ${dc('Técnico', sp.tecnico)}
    ${dc('Método de Medición', sp.metodo)}
  </div>`;
  if ((sp.intervenciones||[]).length) {
    html += `<div style="font-size:.65rem;color:#aaa;margin-bottom:7px">Historial de intervenciones</div>
    <div class="iv-list">${sp.intervenciones.map(i=>`<div class="iv"><div class="iv-date">${esc(i.fecha)}</div><div>${esc(i.nota)}</div></div>`).join('')}</div>`;
  }

  if ((sp.fotos||[]).length) {
    html += `<div class="sub-title">Fotografías</div>
    <div class="photo-row">${sp.fotos.map((f,i)=>`<img class="ph-thumb" src="${f}" alt="foto ${i+1}" onclick="openLB('${i}','${sp.id}')">`).join('')}</div>`;
  }

  det.innerHTML = html;
}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLB(idx, id) {
  const sp = db.find(s=>s.id===id); if (!sp) return;
  document.getElementById('lb-img').src = sp.fotos[idx];
  document.getElementById('lb').classList.add('open');
}
function closeLB() { document.getElementById('lb').classList.remove('open'); }

// ── Delete ────────────────────────────────────────────────────────────────
function deleteSp(id) {
  if (!confirm('¿Eliminar este ejemplar del inventario?')) return;
  db = db.filter(s=>s.id!==id); save(); selectedId=null; renderList();
  document.getElementById('detail').innerHTML='';
  document.getElementById('placeholder').style.display='flex';
  toast('Ejemplar eliminado','err');
}

// ── Form ──────────────────────────────────────────────────────────────────
function sel(name, opts, val='') {
  return `<select name="${name}">${opts.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
}
function inp(name, type='text', val='', placeholder='') {
  return `<input type="${type}" name="${name}" value="${esc(val)}" placeholder="${esc(placeholder)}">`;
}
function inpReadonly(name, val='', placeholder='', id='') {
  return `<input type="text" name="${name}" id="${id}" value="${esc(val)}" placeholder="${esc(placeholder)}" readonly>`;
}
function txta(name, val='', placeholder='') {
  return `<textarea name="${name}" placeholder="${esc(placeholder)}">${esc(val)}</textarea>`;
}

function buildForm(sp={}) {
  formPhotos = [...(sp.fotos||[])];
  formIntervs = [...(sp.intervenciones||[])];
  const dapCalc = sp.dap || (sp.perimetro ? calcDAP(sp.perimetro) : '');

  return `<div class="fg">
  <!-- 1. Taxonomía -->
  <div class="sec"><span class="n">1</span> Identificación y Taxonomía</div>
  <div class="f"><label class="flbl">Nombre Común</label>${inp('nombreComun','text',sp.nombreComun,'ej. Alcornoque')}</div>
  <div class="f"><label class="flbl">Nombre Científico</label>${inp('nombreCientifico','text',sp.nombreCientifico,'ej. Quercus suber')}</div>
  <div class="f"><label class="flbl">Familia</label>${inp('familia','text',sp.familia,'ej. Fagaceae')}</div>
  <div class="f"><label class="flbl">Género</label>${inp('genero','text',sp.genero,'ej. Quercus')}</div>
  <div class="f"><label class="flbl">Origen</label>${sel('origen',ORIGENS,sp.origen||'Autóctona')}</div>
  <div class="f"><label class="flbl">Hábito de Crecimiento</label>${sel('habito',HABITS,sp.habito||'Árbol')}</div>

  <!-- 2. Ubicación -->
  <div class="sec"><span class="n">2</span> Ubicación y Datos Espaciales</div>
  <div class="f">
    <label class="flbl">Latitud (GPS)</label>
    <div class="gps-row">
      ${inp('lat','text',sp.lat,'38.916700')}
      <button type="button" class="btn btn-s btn-sm" onclick="captureGPS()">📍 Capturar</button>
    </div>
  </div>
  <div class="f"><label class="flbl">Longitud (GPS)</label>${inp('lon','text',sp.lon,'-6.341700')}</div>
  <div class="f fw"><label class="flbl">Ubicación Descriptiva</label>${inp('ubicacionDesc','text',sp.ubicacionDesc,'ej. Parque Central, zona norte')}</div>
  <div class="f"><label class="flbl">Municipio</label>${inp('municipio','text',sp.municipio,'ej. Mérida')}</div>

  <!-- 3. Dendrometría -->
  <div class="sec"><span class="n">3</span> Datos Dendrométricos</div>

  <div class="f">
    <label class="flbl">Perímetro Tronco (cm) ✏️</label>
    <input type="number" name="perimetro" id="perimetro-field" value="${esc(sp.perimetro)}" placeholder="ej. 94.2" oninput="onPerimetroChange(this.value)" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);background:#fff;font-family:var(--sans);font-size:.78rem;border-radius:6px;outline:none;color:var(--ink);font-weight:600">
    <div style="font-size:.6rem;color:#7a9070;margin-top:2px">Introduce el perímetro → DAP se calcula solo</div>
  </div>

  <div class="f">
    <label class="flbl">DAP — Diámetro a 1,30 m (cm) 🔒</label>
    ${inpReadonly('dap', dapCalc, 'calculado automáticamente', 'dap-field')}
    <div class="dap-info"> DAP = Perímetro ÷ π</div>
  </div>

  <div class="f"><label class="flbl">Altura Total (m)</label>${inp('altura','number',sp.altura,'ej. 12.5')}</div>
  <div class="f"><label class="flbl">Anchura de Copa (m)</label>${inp('anchuraCopa','number',sp.anchuraCopa,'ej. 8.0')}</div>

  <!-- 4. Salud -->
  <div class="sec"><span class="n">4</span> Estado de Salud</div>
  <div class="f"><label class="flbl">Estado Fitosanitario</label>${sel('salud',SALUDS,sp.salud||'Bueno')}</div>
  <div class="f"><label class="flbl">Evaluación de Riesgo</label>${sel('riesgo',RIESGOS,sp.riesgo||'Bajo')}</div>
  <div class="f fw"><label class="flbl">Deficiencias / Daños</label>${txta('deficiencias',sp.deficiencias,'Plagas, enfermedades, heridas, ramas rotas...')}</div>
  <div class="f fw"><label class="flbl">Observaciones Adicionales</label>${txta('observaciones',sp.observaciones,'Notas técnicas libres...')}</div>

  <!-- 5. Fenología -->
  <div class="sec"><span class="n">5</span> Fenología</div>
  <div class="f"><label class="flbl">Estado Fenológico</label>${sel('fenologia',FENOLS,sp.fenologia||'En hoja')}</div>

  <!-- 6. Gestión -->
  <div class="sec"><span class="n">6</span> Gestión y Mantenimiento</div>
  <div class="f"><label class="flbl">Próxima Intervención</label>${inp('proximaInterv','date',sp.proximaInterv)}</div>
  <div class="f fw">
    <label class="flbl">Añadir Intervención Realizada</label>
    <div class="iv-add-row">
      <input type="text" id="iv-input" placeholder="ej. Poda de formación, tratamiento fitosanitario..." onkeydown="if(event.key==='Enter'){addInterv();event.preventDefault()}">
      <button type="button" class="btn btn-s btn-sm" onclick="addInterv()">+ Añadir</button>
    </div>
    <div id="iv-form-list"></div>
  </div>

  <!-- 7. Muestreo -->
  <div class="sec"><span class="n">7</span> Datos del Muestreo</div>
  <div class="f"><label class="flbl">Técnico Responsable</label>${inp('tecnico','text',sp.tecnico,'Nombre del técnico')}</div>
  <div class="f"><label class="flbl">Método de Medición</label>${sel('metodo',METODOS,sp.metodo||'Estimación visual')}</div>

  <!-- Fotos -->
  <div class="sec"><span class="n">📷</span> Fotografías</div>
  <div class="f fw">
    <div id="photo-preview"></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:7px">
      <button type="button" class="ph-add" onclick="document.getElementById('file-inp').click()">
        <span style="font-size:1.2rem">+</span><span>Añadir foto</span>
      </button>
    </div>
    <input type="file" id="file-inp" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">
    <div style="font-size:.6rem;color:#bbb;margin-top:4px">Clic en foto para eliminarla</div>
  </div>
  </div>`;
}

// ── Cálculo automático DAP al introducir perímetro ───────────────────────
function onPerimetroChange(val) {
  const dap = calcDAP(val);
  const field = document.getElementById('dap-field');
  if (field) field.value = dap;
}

function renderFormPhotos() {
  const pre = document.getElementById('photo-preview'); if (!pre) return;
  pre.innerHTML = formPhotos.map((f,i)=>
    `<img class="ph-del" src="${f}" alt="foto" title="Clic para eliminar" onclick="removePhoto(${i})">`
  ).join('');
}

function renderFormIntervs() {
  const el = document.getElementById('iv-form-list'); if (!el) return;
  el.innerHTML = formIntervs.map((v,i)=>`
    <div class="iv" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="iv-date">${esc(v.fecha)}</div><div>${esc(v.nota)}</div></div>
      <button type="button" class="btn-icon" style="font-size:.65rem" onclick="removeInterv(${i})">✕</button>
    </div>`).join('');
}

function addPhotos(e) {
  Array.from(e.target.files).forEach(f=>{
    const r = new FileReader();
    r.onload = ev => { formPhotos.push(ev.target.result); renderFormPhotos(); };
    r.readAsDataURL(f);
  });
}
function removePhoto(i) { formPhotos.splice(i,1); renderFormPhotos(); }

function addInterv() {
  const el = document.getElementById('iv-input');
  const val = el.value.trim(); if (!val) return;
  formIntervs.push({fecha: new Date().toLocaleDateString('es-ES'), nota:val});
  el.value=''; renderFormIntervs();
}
function removeInterv(i) { formIntervs.splice(i,1); renderFormIntervs(); }

function captureGPS() {
  navigator.geolocation?.getCurrentPosition(
    p=>{
      document.querySelector('[name=lat]').value = p.coords.latitude.toFixed(6);
      document.querySelector('[name=lon]').value = p.coords.longitude.toFixed(6);
      toast('GPS capturado ✓');
    },
    ()=>toast('No se pudo obtener GPS','err'),
    {enableHighAccuracy:true}
  );
}

function openNew() {
  editingId=null;
  document.getElementById('modal-title').textContent='✚ Nuevo Ejemplar';
  document.getElementById('modal-body').innerHTML=buildForm();
  renderFormPhotos(); renderFormIntervs();
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const sp=db.find(s=>s.id===id); if (!sp) return;
  editingId=id;
  document.getElementById('modal-title').textContent='✏️ Editar Ejemplar';
  document.getElementById('modal-body').innerHTML=buildForm(sp);
  renderFormPhotos(); renderFormIntervs();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId=null;
}
function overlayClick(e) {
  if (e.target===document.getElementById('overlay')) closeModal();
}

function readForm() {
  try {
    const f = {};
    // Recoger todos los campos con name= del modal
    const fields = document.querySelectorAll('#modal-body input, #modal-body select, #modal-body textarea');
    fields.forEach(el => {
      if (el.name) f[el.name] = el.value || '';
    });
    // DAP: leer siempre del campo readonly por id (por si querySelectorAll lo omite)
    const dapEl = document.getElementById('dap-field');
    if (dapEl && dapEl.value) f.dap = dapEl.value;
    // Normalizar DAP a número
    if (f.dap && !isNaN(parseFloat(f.dap))) {
      f.dap = parseFloat(f.dap).toFixed(2);
    }
    f.fotos = Array.isArray(formPhotos) ? formPhotos : [];
    f.intervenciones = Array.isArray(formIntervs) ? formIntervs : [];
    return f;
  } catch(e) {
    console.error('readForm error:', e);
    toast('Error leyendo formulario: ' + e.message, 'err');
    return null;
  }
}

function saveForm() {
  try {
    const f = readForm();
    if (!f) return;

    if (!f.nombreComun && !f.nombreCientifico) {
      toast('Indica al menos el nombre común o científico', 'err');
      return;
    }

    if (editingId) {
      const idx = db.findIndex(s => s.id === editingId);
      if (idx >= 0) {
        db[idx] = Object.assign({}, db[idx], f);
        selectedId = editingId;
      } else {
        toast('No se encontró el registro a editar', 'err');
        return;
      }
    } else {
      const nuevo = Object.assign({}, f, {
        id: uuid(),
        fechaRegistro: new Date().toISOString()
      });
      db.push(nuevo);
      selectedId = nuevo.id;
    }

    const ok = save();
    if (!ok) return; // save() ya muestra el toast de error

    closeModal();
    renderList();
    const sp = db.find(s => s.id === selectedId);
    if (sp) renderDetail(sp);
    toast(editingId ? 'Ejemplar actualizado ✓' : 'Ejemplar registrado ✓');

  } catch(e) {
    console.error('saveForm error:', e);
    toast('Error al guardar: ' + e.message, 'err');
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────
function barChart(data, title) {
  const max=Math.max(...Object.values(data),1);
  return `<div class="chart-box"><div class="chart-title">${title}</div>${
    Object.entries(data).map(([k,v])=>`
    <div class="bar-row">
      <div class="bar-lbl">${esc(k)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%">
          <span class="bar-v">${v}</span>
        </div>
      </div>
    </div>`).join('')
  }</div>`;
}

function renderStats() {
  const sv=document.getElementById('stats-view');
  const n=db.length;
  const bH={Bueno:0,Regular:0,Malo:0}, bHabit={}, bO={}, bM={};
  const daps=[];
  db.forEach(s=>{
    if(s.salud) bH[s.salud]=(bH[s.salud]||0)+1;
    if(s.habito) bHabit[s.habito]=(bHabit[s.habito]||0)+1;
    if(s.origen) bO[s.origen]=(bO[s.origen]||0)+1;
    if(s.municipio) bM[s.municipio]=(bM[s.municipio]||0)+1;
    if(s.dap) daps.push(parseFloat(s.dap));
  });
  const avgDap = daps.length?(daps.reduce((a,b)=>a+b,0)/daps.length).toFixed(1):'—';
  const cards=[
    {n,l:'Total Ejemplares'},
    {n:Object.keys(bHabit).length,l:'Tipos de Hábito'},
    {n:avgDap,l:'DAP Medio (cm)'},
    {n:db.filter(s=>s.salud==='Malo').length,l:'En Mal Estado'},
    {n:db.filter(s=>s.riesgo==='Alto'||s.riesgo==='Crítico').length,l:'Riesgo Alto/Crítico'},
    {n:db.filter(s=>(s.fotos||[]).length>0).length,l:'Con Fotografías'},
  ];
  sv.innerHTML=`
  <div class="stats-grid">${cards.map(c=>`<div class="sc"><div class="sc-n">${c.n}</div><div class="sc-l">${c.l}</div></div>`).join('')}</div>
  <div class="charts">
    ${barChart(bH,'Estado Fitosanitario')}
    ${barChart(bHabit,'Hábito de Crecimiento')}
    ${Object.keys(bO).length?barChart(bO,'Origen'):''}
    ${Object.keys(bM).length?barChart(bM,'Por Municipio'):''}
  </div>`;
}

// ── Export ────────────────────────────────────────────────────────────────
function exportGeoJSON() {
  const feats=db.filter(s=>s.lat&&s.lon).map(s=>({
    type:'Feature',
    geometry:{type:'Point',coordinates:[parseFloat(s.lon),parseFloat(s.lat)]},
    properties:{...s,fotos:undefined}
  }));
  dl(JSON.stringify({type:'FeatureCollection',features:feats},null,2),'application/json',`raiz-savia-${hoy()}.geojson`);
  toast(`${feats.length} features GeoJSON exportadas`);
}

function exportCSV() {
  const cols=['id','nombreComun','nombreCientifico','familia','genero','origen','habito','lat','lon','ubicacionDesc','municipio','perimetro','dap','altura','anchuraCopa','salud','riesgo','fenologia','tecnico','metodo','proximaInterv','fechaRegistro'];
  const rows=[cols.join(';'),...db.map(s=>cols.map(c=>`"${String(s[c]||'').replace(/"/g,'""')}"`).join(';'))];
  dl(rows.join('\n'),'text/csv;charset=utf-8;',`raiz-savia-${hoy()}.csv`);
  toast(`${db.length} registros CSV exportados`);
}

function dl(content,type,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}
function hoy(){return new Date().toISOString().slice(0,10);}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.className='toast'+(type==='err'?' err':'');
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

// ── Init ──────────────────────────────────────────────────────────────────
renderList();
</script>
